name: Sync to Notion

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'scripts/**'
      - '.github/workflows/notion-sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # commit back을 위해 필요

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run sync script
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: node sync-all.js

      - name: Commit frontmatter changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "변경사항 없음, commit 건너뜀"
          else
            git commit -m "chore: sync notion ids [skip ci]"
            git push
          fi